<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./images/icon.jpg" type="image/x-icon">
    <title>Disney +</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><img src="./images/logo.png" alt="Disney + Logo"></li>
                <li>DISNEY +</li>
                <li>PARKS & TRAVEL</li>
                <li>MOVIES</li>
                <li>SHOP</li>
                <li>MORE</li>

                <div class="second-bar">
                    <li><button>Login</button></li>
                    <li><input type="text" placeholder="Search"></li>
                    <li><button>Search</button></li>
                </div>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <img src="./images/snow-white.png" alt="title">
            <p>Experience the magic of Disney with our exclusive content, including movies, TV shows, and original programming. Join now and start streaming your favorite Disney classics and new releases!</p>
            <button>Get Tickets Now</button>
            <button>Learn More</button>
        </section>
    </main>

    <script src="logic.js"></script>
</body>
</html>
